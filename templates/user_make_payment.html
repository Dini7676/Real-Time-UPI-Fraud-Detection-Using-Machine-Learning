<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/css/styles.css"><title>Make Payment</title></head>
<body class="gradient-bg">
<div class="glass-card">
  <h2>Make Payment</h2>
  <form method="POST" class="fade-in">
    <input name="mobile_number" placeholder="Sender Mobile Number" required>
    <input name="receiver" placeholder="Receiver UPI" required>
    <input name="location" placeholder="Location (City)" required>
    <input name="amount" type="number" step="0.01" placeholder="Amount" required class="glow-input">
    <button class="btn neon" type="submit">Pay</button>
  </form>
  <div class="scanner"><div class="scan-line"></div></div>
</div>
<script src="/static/js/animations.js"></script>
</body></html>
