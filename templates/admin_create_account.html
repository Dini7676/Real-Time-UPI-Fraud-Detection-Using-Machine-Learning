<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/securepay/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="glass-container split-layout">
  <a href="{{ url_for('admin_dashboard') }}" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

  <div class="left-panel">
    <i class="fa-solid fa-credit-card" style="font-size: 80px; margin-bottom: 20px; color:#4facfe;"></i>
    <h2>Account Onboarding</h2>
  </div>

  <div class="right-panel">
    <h2 class="panel-title">Enter New Account Details</h2>
    <p class="panel-subtitle">All fields are stored immediately for the selected user role.</p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div style="background: rgba(0,0,0,0.35); border-radius: 8px; padding: 10px 15px; margin-bottom: 20px; color: #4ef7a2;">
        {% for message in messages %}
          <div>{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_create_account') }}">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" name="mobile" class="form-control" placeholder="9957000001" inputmode="numeric" maxlength="10" pattern="[0-9]{10}" autocomplete="tel" required>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" name="dob" class="form-control" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Age</label>
          <input type="number" name="age" class="form-control" min="0" max="120" placeholder="30" required>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select name="role" class="form-control" style="background:rgba(0,0,0,0.3); color:white;" required>
            <option value="user">User</option>
            <option value="merchant">Merchant</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="form-group" style="margin-bottom:15px;">
        <label>Full Address</label>
        <input type="text" name="address" class="form-control" placeholder="Street, Apartment, etc." required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>State</label>
          <select name="state" class="form-control" style="background:rgba(0,0,0,0.3); color:white;" required>
            <option value="">-- Select State/UT --</option>
            <optgroup label="States">
              <option>Andhra Pradesh</option>
              <option>Arunachal Pradesh</option>
              <option>Assam</option>
              <option>Bihar</option>
              <option>Chhattisgarh</option>
              <option>Goa</option>
              <option>Gujarat</option>
              <option>Haryana</option>
              <option>Himachal Pradesh</option>
              <option>Jharkhand</option>
              <option>Karnataka</option>
              <option>Kerala</option>
              <option>Madhya Pradesh</option>
              <option>Maharashtra</option>
              <option>Manipur</option>
              <option>Meghalaya</option>
              <option>Mizoram</option>
              <option>Nagaland</option>
              <option>Odisha</option>
              <option>Punjab</option>
              <option>Rajasthan</option>
              <option>Sikkim</option>
              <option>Tamil Nadu</option>
              <option>Telangana</option>
              <option>Tripura</option>
              <option>Uttar Pradesh</option>
              <option>Uttarakhand</option>
              <option>West Bengal</option>
            </optgroup>
            <optgroup label="Union Territories">
              <option>Andaman and Nicobar Islands</option>
              <option>Chandigarh</option>
              <option>Dadra and Nagar Haveli and Daman and Diu</option>
              <option>Delhi</option>
              <option>Jammu and Kashmir</option>
              <option>Ladakh</option>
              <option>Lakshadweep</option>
              <option>Puducherry</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label>ZIP Code</label>
          <input type="text" name="zip" class="form-control" placeholder="572101" required>
        </div>
      </div>

      <div class="form-group" style="margin-bottom:15px;">
        <label>UPI ID (optional)</label>
        <input type="text" name="upi" class="form-control" placeholder="john@upi">
      </div>

      <button type="submit" class="btn-submit">Create Account</button>
    </form>
  </div>
</div>

<script>
  (function(){
    const mobileInput = document.querySelector('input[name="mobile"]');
    if (!mobileInput) {
      return;
    }
    mobileInput.addEventListener('input', function(e) {
      const digits = e.target.value.replace(/\D/g, '').slice(0, 10);
      e.target.value = digits;
    });
    mobileInput.addEventListener('keypress', function(e) {
      if (!/[0-9]/.test(e.key)) {
        e.preventDefault();
      }
    });
    mobileInput.addEventListener('paste', function(e) {
      e.preventDefault();
      const paste = (e.clipboardData || window.clipboardData).getData('text');
      const digits = (paste || '').replace(/\D/g, '').slice(0, 10);
      document.execCommand('insertText', false, digits);
    });
  })();
</script>

</body>
</html>
