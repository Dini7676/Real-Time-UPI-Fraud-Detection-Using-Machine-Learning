<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - SecurePay</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="glass-card container-pad">
    <div class="header">
      <a class="back-link" href="./admin-dashboard.html">← Back to Dashboard</a>
      <div></div>
    </div>
    <div class="split">
      <div class="left center">
        <div class="icon-circle icon-admin"><i class="fa-solid fa-user-plus"></i></div>
      </div>
      <div class="right">
        <form class="form">
          <label class="label">Full Name</label>
          <input class="input" placeholder="Full Name" />

          <label class="label mt-2">Email</label>
          <input class="input" type="email" placeholder="name@example.com" />

          <label class="label mt-2">Mobile Number</label>
          <input class="input" placeholder="9957000001" maxlength="10" inputmode="numeric" />

          <label class="label mt-2">DOB</label>
          <input class="input" type="date" />

          <label class="label mt-2">Address</label>
          <input class="input" placeholder="Street, City" />

          <label class="label mt-2">State</label>
          <select class="input">
            <option value="">Select State</option>
            <option>Karnataka</option>
            <option>Maharashtra</option>
            <option>Delhi</option>
            <option>Tamil Nadu</option>
            <option>Gujarat</option>
          </select>

          <label class="label mt-2">ZIP Code</label>
          <input class="input" placeholder="560001" maxlength="6" inputmode="numeric" />

          <button class="btn success mt-4" type="button">Create Account</button>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
</body>
</html>
